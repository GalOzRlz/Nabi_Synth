name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - name: Install ALSA development libraries
      run: |
        sudo apt-get install -y libasound2-dev pkg-config
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --release --verbose
